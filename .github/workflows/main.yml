on: push
name: 🚀 Build Sass and deploy website on push
jobs:
  tests:
    name: run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: SFTP upload
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ftp.thevictory.nl
          username: ${{secrets.FTP_USERNAME}}
          password: ${{secrets.FTP_PASSWORD}}
          port: 21
          uploads: ./ => ./httpdocs/wp-content/themes/the-victory-tafeltennis
          ignore: |
            *.git
            *.github
            *node_modules
            *scss
            package.json
            package-lock.json
            .gitignore
            LICENSE
            README.md
